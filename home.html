<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Dms</title>
    <link rel="stylesheet" href="/projeto-Calculadora-10/assets/styles/home.css">
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
</head>

<body>
    <header>
        <div>
            <h1>
                Calculadora
            </h1>
        </div>
    </header>
    <main>

        <div class="container-main">
            <div class="painel">
                <h2></h2>
            </div>
            <div class="container-btn">

                <button id="apagar">C</button>
                <button id="apagar2">D</button>
                <button id="raiz" class="btn-numbers2">√</button>
                <button id="porcentagem" class="btn-numbers2">%</button>
                

                <button id="7" class="btn-numbers">7</button>
                <button id="8" class="btn-numbers">8</button>
                <button id="9" class="btn-numbers">9</button>
                <button id="X" class="btn-numbers2">x</button>

                <button id="4" class="btn-numbers">4</button>
                <button id="5" class="btn-numbers">5</button>
                <button id="6" class="btn-numbers">6</button>
                <button id="menos" class="btn-numbers2">-</button>

                <button id="1" class="btn-numbers">1</button>
                <button id="2" class="btn-numbers">2</button>
                <button id="3" class="btn-numbers">3</button>
                <button id="soma" class="btn-numbers2">+</button>

                <button id="0" class="btn-numbers">0</button>
                <button id="ponto" class="btn-numbers">.</button>
